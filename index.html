<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vår Odlingslott</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="site-brand">
      <h1>Vår Odlingslott</h1>
      <p class="subtitle">Följ vår resa med kolonilotten</p>
    </div>
    <div id="auth-area" class="auth-area"></div>
  </header>

  <main id="app">
    <div class="toolbar" id="toolbar" hidden>
      <button id="new-post-btn" class="btn-primary">+ Nytt inlägg</button>
    </div>

    <section id="composer" class="composer" hidden>
      <div class="composer-header">
        <h2 id="composer-heading">Nytt inlägg</h2>
        <button type="button" id="close-composer" class="btn-close" aria-label="Stäng">&times;</button>
      </div>

      <div id="composer-start" class="composer-start">
        <input type="text" id="composer-title" placeholder="Titel" required>
        <input type="text" id="composer-author" placeholder="Ditt namn" required>
        <button type="button" id="start-post-btn" class="btn-primary">Börja skriva</button>
      </div>

      <div id="composer-body" hidden>
        <h3 class="composer-post-title" id="composer-title-display"></h3>
        <div id="composer-blocks" class="composer-blocks"></div>

        <div id="composer-add-form" class="composer-add-form" hidden></div>

        <div class="composer-add-buttons">
          <button type="button" class="btn-secondary" data-add="text">+ Text</button>
          <button type="button" class="btn-secondary" data-add="subtitle">+ Underrubrik</button>
          <button type="button" class="btn-secondary" data-add="image">+ Bild</button>
          <button type="button" class="btn-secondary" data-add="video">+ Video</button>
        </div>

        <div class="composer-actions">
          <button type="button" id="publish-btn" class="btn-primary">Avsluta inlägg</button>
          <button type="button" id="cancel-composer-btn" class="btn-ghost">Avbryt</button>
        </div>
      </div>
    </section>

    <div id="loading">Laddar...</div>
    <div id="empty-state" hidden>
      <p>Inga inlägg ännu.</p>
    </div>
    <div id="feed"></div>
  </main>

  <input type="file" id="file-input-gallery" accept="image/*" hidden>
  <input type="file" id="file-input-camera" accept="image/*" capture="environment" hidden>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
